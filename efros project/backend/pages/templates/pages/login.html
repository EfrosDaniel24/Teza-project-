<!DOCTYPE html>
<html lang="ro">
  <head>
    {% load static %}
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apple Health+ — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Work+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'pages/css/register.css' %}" />
  </head>
  <body>
    <div class="page">
      <header class="topbar">
        <div class="logo">
          <div class="logo-mark" aria-hidden="true">
            <span></span>
            <span></span>
          </div>
          <div class="logo-text">Apple Health<span>+</span></div>
        </div>
        <nav class="nav">
          <a class="nav-link" href="{% url 'landing' %}">Home</a>
          <a class="nav-link" href="{% url 'about' %}">About Us</a>
          <a class="nav-link" href="{% url 'howto' %}">How to use</a>
        </nav>
        <div class="top-actions">
          <a class="link" href="{% url 'register' %}">Înregistrare</a>
          <a class="btn-secondary" href="{% url 'login' %}">Log In</a>
        </div>
      </header>

      <main class="register">
        <section class="register-left">
          <h1>Bine ai revenit!</h1>
          <p>Accesează rapid datele tale de sănătate.</p>
        </section>

        <section class="register-card">
          <h2>Log In</h2>
          <form class="form" method="post" novalidate>
            {% csrf_token %}
            {{ form.non_field_errors }}

            <label class="input">
              <span>Email</span>
              {{ form.email }}
              <span class="icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M4 6h16a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2z"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                  />
                  <path d="M22 8l-10 7L2 8" fill="none" stroke="currentColor" stroke-width="2" />
                </svg>
              </span>
            </label>
            {{ form.email.errors }}

            <label class="input">
              <span>Parola</span>
              {{ form.password }}
              <span class="icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M4 12s3-5 8-5 8 5 8 5-3 5-8 5-8-5-8-5z"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                  />
                  <circle cx="12" cy="12" r="2" fill="currentColor" />
                </svg>
              </span>
            </label>
            {{ form.password.errors }}

            <button type="submit" class="btn-primary">Log In</button>
          </form>
        </section>
      </main>
    </div>
  </body>
</html>
